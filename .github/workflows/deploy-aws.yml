# Reusable AWS deploy workflow — copy to each repo as .github/workflows/deploy-aws.yml
# and substitute mention (ecs service + ecr repo name) and packages/backend/Dockerfile (path).
name: Deploy to AWS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: 237343248947.dkr.ecr.us-west-2.amazonaws.com
  APP: mention
  CLUSTER: oxy-cluster
  DOCKERFILE: packages/backend/Dockerfile

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Configure AWS credentials (OIDC, no stored keys)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: arn:aws:iam::237343248947:role/oxy-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync GitHub secrets -> SSM (GitHub is the source of truth)
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
          # Explicit backend runtime allowlist. Do not sync unrelated CI/CD
          # credentials (for example Cloudflare or DigitalOcean deploy tokens)
          # into the AWS SSM parameter hierarchy.
          SSM_SECRET_ALLOWLIST: >-
            ADMIN_USER_IDS ALIA_API_KEY DO_SPACES_KEY DO_SPACES_SECRET
            FIREBASE_SERVICE_ACCOUNT_BASE64 FIREBASE_PROJECT_ID KLIPY_APP_KEY
            LIVEKIT_API_KEY LIVEKIT_API_SECRET MENTION_OXY_CLIENT_ID
            MENTION_PRIVATE_KEY MENTION_MCP_JWT_SECRET
            MONGODB_URI OXY_DB_URI OXY_SERVICE_API_KEY OXY_SERVICE_API_SECRET
            OXY_SERVICE_TOKEN REDIS_URL REDIS_URI REDIS_HOST REDIS_PASSWORD
            AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY
        run: |
          SHARED="AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY REDIS_URL LIVEKIT_API_KEY LIVEKIT_API_SECRET"
          echo "$SECRETS_JSON" | jq -r --arg allowlist "$SSM_SECRET_ALLOWLIST" '
            ($allowlist | split(" ")) as $allowed
            | to_entries[]
            | select(.key as $k | $allowed | index($k))
            | [.key,.value]|@tsv
          ' | \
          while IFS=$'\t' read -r k v; do
            [ -z "$k" ] && continue
            if [ -z "$v" ] || [ "$v" = "-" ]; then
              echo "::warning::skip empty/placeholder secret $k; SSM unchanged"
              continue
            fi
            if [ "$k" = "REDIS_URL" ] && [ "$AWS_REGION" = "us-west-2" ] && ! printf '%s' "$v" | grep -q '\.usw2\.cache\.amazonaws\.com'; then
              echo "::warning::skip REDIS_URL because it does not point at the us-west-2 Valkey endpoint; SSM unchanged"
              continue
            fi
            case " $SHARED " in *" $k "*) path="/oxy/_shared/$k";; *) path="/oxy/$APP/$k";; esac
            aws ssm put-parameter --name "$path" --value "$v" --type SecureString --overwrite >/dev/null && echo "synced -> $path"
          done

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Build and push (linux/arm64)
        run: |
          IMG=$ECR_REGISTRY/oxy/$APP
          docker build -f "$DOCKERFILE" -t "$IMG:${{ github.sha }}" -t "$IMG:latest" .
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"

      - name: Deploy to ECS (rolling; skipped until the service exists)
        run: |
          set -euo pipefail

          # Poll the PRIMARY deployment's rolloutState instead of the fixed
          # `aws ecs wait services-stable` waiter (40 attempts x 15s = 10 min),
          # which is shorter than Mention's rollout + ALB drain time and caused
          # every successful deploy to false-fail with "Max attempts exceeded".
          MAX_WAIT_SECS=1200   # 20 min hard cap before we call it a real timeout
          POLL_INTERVAL=15     # seconds between describe-services polls

          STATUS=$(aws ecs describe-services --cluster "$CLUSTER" --services "$APP" --query 'services[0].status' --output text 2>/dev/null || echo NONE)
          if [ "$STATUS" != "ACTIVE" ]; then
            echo "ECS service $APP not created yet — image is in ECR, skipping deploy"
            exit 0
          fi

          aws ecs update-service --cluster "$CLUSTER" --service "$APP" --force-new-deployment >/dev/null
          echo "Triggered new deployment for $APP; polling rolloutState (timeout ${MAX_WAIT_SECS}s)..."

          elapsed=0
          while [ "$elapsed" -lt "$MAX_WAIT_SECS" ]; do
            # describe-services must not abort the loop on a transient error (set -e safe).
            DESC=$(aws ecs describe-services \
              --cluster "$CLUSTER" --services "$APP" \
              --query 'services[0].deployments[?status==`PRIMARY`]|[0].[rolloutState,runningCount,desiredCount]' \
              --output text 2>/dev/null) || DESC=""

            if [ -z "$DESC" ] || [ "$DESC" = "None" ]; then
              echo "  ($elapsed s) no PRIMARY deployment info yet, retrying..."
            else
              ROLLOUT_STATE=$(echo "$DESC" | awk '{print $1}')
              RUNNING=$(echo "$DESC" | awk '{print $2}')
              DESIRED=$(echo "$DESC" | awk '{print $3}')
              echo "  ($elapsed s) rolloutState=$ROLLOUT_STATE running=$RUNNING desired=$DESIRED"

              if [ "$ROLLOUT_STATE" = "COMPLETED" ] && [ "$RUNNING" = "$DESIRED" ]; then
                echo "deployed $APP — rollout COMPLETED ($RUNNING/$DESIRED tasks running)"
                exit 0
              fi
              if [ "$ROLLOUT_STATE" = "FAILED" ]; then
                echo "::error::ECS rollout for $APP FAILED — see service events in the AWS console"
                exit 1
              fi
            fi

            sleep "$POLL_INTERVAL"
            elapsed=$((elapsed + POLL_INTERVAL))
          done

          echo "::error::ECS rollout for $APP did not reach COMPLETED within ${MAX_WAIT_SECS}s (genuine timeout)"
          exit 1
