name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - name: Build shared types
        run: bun run --cwd packages/shared-types build
      - name: Lint frontend
        run: bun run --cwd packages/frontend lint
      - name: Typecheck frontend
        run: bun run --cwd packages/frontend typecheck
      - name: Build backend
        run: bun run --cwd packages/backend build
      - name: Typecheck MCP
        run: bun run --cwd packages/mcp typecheck
      - name: Test MCP
        run: bun run --cwd packages/mcp test
      - name: Build MCP
        run: bun run --cwd packages/mcp build
      - name: Test backend MCP module
        run: bun run --cwd packages/backend test -- src/__tests__/mcp
      - name: Build frontend
        run: bun run --cwd packages/frontend build
