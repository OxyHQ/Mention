name: Backfill Federated Media

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Posts read from Mongo per page'
        required: false
        default: '50'
      concurrency:
        description: 'Concurrent remote media downloads/uploads'
        required: false
        default: '3'

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    env:
      NODE_ENV: production
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_READ_PREFERENCE: primary
      MENTION_PUBLIC_API_URL: https://api.mention.earth
      OXY_API_URL: https://api.oxy.so
      OXY_SERVICE_API_KEY: ${{ secrets.OXY_SERVICE_API_KEY }}
      OXY_SERVICE_API_SECRET: ${{ secrets.OXY_SERVICE_API_SECRET }}
      FEDERATION_MEDIA_CACHE_WRITE_ENABLED: 'true'
      FEDERATED_MEDIA_BACKFILL_SCRIPT_BATCH_SIZE: ${{ inputs.batch_size }}
      FEDERATED_MEDIA_BACKFILL_SCRIPT_CONCURRENCY: ${{ inputs.concurrency }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Backfill all federated media assets
        working-directory: packages/backend
        run: bun src/scripts/backfillFederatedMediaAssets.ts
