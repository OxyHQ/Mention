name: Deploy Frontends

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-frontends.yml'
      - 'packages/frontend/**'
      - 'packages/agora/**'
      - 'packages/agora-shared/**'
      - 'packages/shared-types/**'
      - 'package.json'
      - 'bun.lock'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      agora: ${{ steps.changes.outputs.agora }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'packages/frontend/**'
              - 'packages/shared-types/**'
              - 'package.json'
              - 'bun.lock'
            agora:
              - 'packages/agora/**'
              - 'packages/agora-shared/**'
              - 'packages/shared-types/**'
              - 'package.json'
              - 'bun.lock'

  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'
      - run: bun install --frozen-lockfile
      - name: Build shared types
        run: bun run --cwd packages/shared-types build
      - name: Build frontend
        run: bun run --cwd packages/frontend build
        timeout-minutes: 60
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: 'https://api.mention.earth'
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: 'npm'
          command: pages deploy packages/frontend/dist --project-name=mention-frontend --branch=main

  deploy-agora:
    needs: detect-changes
    if: needs.detect-changes.outputs.agora == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'
      - run: bun install --frozen-lockfile
      - name: Build shared types
        run: bun run --cwd packages/shared-types build
      - name: Build agora
        run: bun run --cwd packages/agora build
        timeout-minutes: 60
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: 'https://api.mention.earth'
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: 'npm'
          command: pages deploy packages/agora/dist --project-name=agora-frontend --branch=main
