services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - redis
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mention:mention_dev@mongo:27017
      - REDIS_URL=redis://:mention_dev@redis:6379

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mention
      MONGO_INITDB_ROOT_PASSWORD: mention_dev
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass mention_dev
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  mongo_data:
